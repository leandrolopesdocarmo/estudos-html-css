<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário/Contato</title>
</head>
<body>
    <h1>Contato</h1>
    <form action="contato.js" method="post" autocomplete="on">
        <fieldset>
            <legend>Dados Pessoais</legend>  

            <p>
                <label for="inome">Nome</label>
                <input type="text" name="nome" id="inome" maxlength="15" minlength="5" >
            </p>

            <p>
                <label for="iemail">E-mail</label>
                <input type="email" nome="email" autocomplete="email" required id="iemail">
            </p>

            <p>
                <label for="itel">Telefone</label>
                <input type="tel" name="tel" id="itel" required autocomplete="tel" pattern="^\(\d{2}\)\d{4,5}-\d{4}$" placeholder="(11)99999-9999">
            </p>
                <!-- Estudar mais sobre RegEx -->
            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </p>
        </fieldset>
    </form>
</body>
</html>
