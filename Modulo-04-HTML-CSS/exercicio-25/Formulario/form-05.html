<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-box/Radio</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.js" method="get" autocomplete="on">

        <fieldset>
            <legend>Sexo</legend>

            <input type="radio" name="sexo" id="imasc" checked value="M">
            <label for="imasc">Masculino</label>

            <input type="radio" value="F" name="sexo" id="ifem">
            <label for="ifem">Feminino</label>
        </fieldset>

        <fieldset>
            <legend>Esportes favorito</legend>

            <input type="checkbox" name="esfut" id="iesfut" checked> <label for="iesfut">Futebol</label>

            <input type="checkbox" name="vol" id="ivol"><label for="ivol"> Volei</label>

            <input type="checkbox" name="nat" id="inat"><label for="inat"> Natação</label>

            <input type="checkbox" name="Basq" id="ibasq"><label for="ibasq"> Basquete</label>
        </fieldset>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
</body>
</html>
