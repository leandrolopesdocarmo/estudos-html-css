<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudoclasses</title>
    <style>
        div{
            display: inline-block;
            background-color: antiquewhite;
            text-align: center;
            height: 200px;
            width: 200px;
            border: 1px solid black;
        }
        div:hover{
            background-color: black;
            color: aliceblue;
        }
    </style>
</head>
<body>
    <h1>
        <div id="d1">01</div>
        <div id="d2">02</div>
        <div id="d3">03</div>
    </h1>
    </body>
</html>
