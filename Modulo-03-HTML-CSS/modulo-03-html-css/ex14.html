<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabela</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 500px;
            border-collapse: collapse;
        }
        caption{
            background-color: lightgray;
            font-size: 1.5em;
            font-weight: bold;
            padding: 8px;
        }
        th, td{
            border: 1px solid black;
            padding: 8px;
        }
        .cnome{
            background-color: grey;
        }
        col.cgroup{
            background-color: yellowgreen;
        }
    </style>
</head>
<body>
    <table>
        <!-- Colgroup para selecionar uma coluna inteira -->
        <!-- <colgroup>
            <col class="cnome">
            <col class="cidade">
            <col class="csexo">
            <col class="cprofissao">
        </colgroup> -->

        <!--outro metodo de usar e criando col.group(grupo de colunas)  -->
        <colgroup>
            <col class="cnome">
            <col class="cgroup" span="2">
            <col class="cprofissao">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Idade</th>
            <th scope="col">Sexo</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>24</td>
            <td>Feminino</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Claudio</td>
            <td>28</td>
            <td>Masculino</td>
            <td>Programador</td>
        </tr>
        <tr>
            <td>Gustavo</td>
            <td>43</td>
            <td>Masculino</td>
            <td>Professor</td>
        </tr>
        <tr>
            <td>Helio</td>
            <td>35</td>
            <td>Masculino</td>
            <td>Vendedor</td>
        </tr>
        <tr>
            <td>Maria</td>
            <td>30</td>
            <td>Feminino</td>
            <td>Médica</td>
        </tr>
        <tr>
            <td>Otávio</td>
            <td>37</td>
            <td>Masculino</td>
            <td>Nutricionista</td>
        </tr>
    </table>
</body>
</html>
