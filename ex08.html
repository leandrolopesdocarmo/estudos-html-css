<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralização vertical de caixas</title>
    <style>
    section#container{
            background-size: 100% 100vh;
            position: relative;
            height:500px;
            padding: 10px;
            background-color: #bdbdbd;
    }

    article#conteudo{
        background-size: 100% 100vh;
        position: relative;
        height: 200px;
        width:400px;
        background-color: blueviolet;

        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
    }
    </style>
</head>
<body>
    <section id="container">
        <article id="conteudo">

        </article>
    </section>
</body>
</html>
